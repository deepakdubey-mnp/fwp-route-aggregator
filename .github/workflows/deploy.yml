name: Build and Deploy to ECS

on:
  push:
    branches: [master]

env:
  AWS_REGION: ap-south-2
  ECR_REPOSITORY: fun-with-flights/airlines-aggregator
  ECS_CLUSTER: fwf-demo-cluster
  ECS_SERVICE: airlines-aggregator-svc
  CONTAINER_NAME: airlines-aggregator

jobs:
  build-and-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    # Required for OIDC token issuance — no stored AWS credentials needed
    permissions:
      id-token: write   # lets GitHub mint a JWT for AWS to verify
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image version and tags
        id: tags
        run: |
          BASE_VERSION=$(grep "^version = " build.gradle \
            | tr -d "' " | cut -d'=' -f2 | sed 's/-SNAPSHOT//')
          IMAGE_TAG="${BASE_VERSION}-${{ github.run_number }}"
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_IMAGE="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}"
          echo "image_tag=${IMAGE_TAG}"              >> $GITHUB_OUTPUT
          echo "versioned=${ECR_IMAGE}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "latest=${ECR_IMAGE}:latest"          >> $GITHUB_OUTPUT
          echo "Building ${ECR_IMAGE}:${IMAGE_TAG}"

      - name: Build OCI image
        run: |
          ./gradlew bootBuildImage \
            --imageName="${{ steps.tags.outputs.versioned }}"

      - name: Tag as latest and push both to ECR
        run: |
          docker tag "${{ steps.tags.outputs.versioned }}" \
                     "${{ steps.tags.outputs.latest }}"
          docker push "${{ steps.tags.outputs.versioned }}"
          docker push "${{ steps.tags.outputs.latest }}"

      - name: Fetch current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition airlines-aggregator \
            --query taskDefinition \
            --output json \
          | jq 'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )' > task-definition.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.tags.outputs.versioned }}

      - name: Deploy to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment summary
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ steps.tags.outputs.versioned }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | \`${{ env.ECS_CLUSTER }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | \`${{ env.ECS_SERVICE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY