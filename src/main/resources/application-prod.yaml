# Production (ECS Fargate) profile — all values injected via ECS task definition env vars.
# Activated by ECS task definition: SPRING_PROFILES_ACTIVE=prod

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: AWS_MSK_IAM
      sasl.jaas.config: "software.amazon.msk.auth.iam.IAMLoginModule required;"
      sasl.client.callback.handler.class: software.amazon.msk.auth.iam.IAMClientCallbackHandler

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

kafka:
  enabled: true   # MSK Serverless is always available on ECS

management:
  health:
    kafka:
      enabled: false
    redis:
      enabled: false

logging:
  level:
    org.fwp: INFO   # reduce verbosity in production
